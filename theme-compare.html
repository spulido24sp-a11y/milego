<!DOCTYPE html>
<html>
<head><title>Theme Comparison</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#0f172a;color:#fff;}
h1{text-align:center;padding:16px;font-size:18px;font-weight:600;letter-spacing:-0.02em;}
h1 span{color:#8b5cf6;}
.comp{display:grid;grid-template-columns:1fr 1fr 1fr;height:calc(100vh - 56px);}
.col{display:flex;flex-direction:column;}
.col h2{padding:8px;text-align:center;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;}
.col:nth-child(1) h2{background:#8b5cf6;color:#fff;}
.col:nth-child(2) h2{background:#1e293b;color:#fff;}
.col:nth-child(3) h2{background:#d4af37;color:#000;}
iframe{flex:1;width:100%;border:none;background:#fff;}
</style></head>
<body>
<h1>MIleGo — <span>Theme Comparison</span></h1>
<div class="comp">
  <div class="col">
    <h2>🎨 Premium (Púrpura)</h2>
    <iframe src="/premium.html"></iframe>
  </div>
  <div class="col">
    <h2>⬜ Minimal (Gris)</h2>
    <iframe src="/minimal.html"></iframe>
  </div>
  <div class="col">
    <h2>🥇 Luxury (Oro/Negro)</h2>
    <iframe src="/luxury.html"></iframe>
  </div>
</div>
</body>
</html>
