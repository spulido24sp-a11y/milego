<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIleGo – Panel Administrativo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    .admin-header {
      background: rgba(15, 23, 42, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      padding: 16px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .admin-logo {
      font-size: 24px;
      font-weight: 800;
      color: #f1f5f9;
      text-decoration: none;
      letter-spacing: -0.5px;
    }
    .admin-logo span { color: #8b5cf6; }

    .admin-header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .admin-header-right span {
      font-size: 13px;
      color: #64748b;
    }

    .btn-back {
      background: rgba(148, 163, 184, 0.1);
      border: 1px solid rgba(148, 163, 184, 0.15);
      color: #cbd5e1;
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .btn-back:hover { background: rgba(148, 163, 184, 0.18); color: #f1f5f9; }

    .admin-container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 28px 32px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 28px;
    }

    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 16px;
      padding: 22px 24px;
      transition: all 0.25s;
    }
    .stat-card:hover { border-color: rgba(139, 92, 246, 0.25); transform: translateY(-2px); }

    .stat-label {
      font-size: 13px;
      font-weight: 500;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: #f1f5f9;
    }

    .stat-value .currency {
      font-size: 18px;
      font-weight: 600;
      color: #94a3b8;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 24px;
    }

    .panel {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(148, 163, 184, 0.08);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 16px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .panel-title .icon { color: #8b5cf6; }

    .table-wrapper { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }

    thead th {
      text-align: left;
      padding: 12px 10px;
      color: #64748b;
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
      white-space: nowrap;
    }

    tbody td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.05);
      color: #cbd5e1;
      font-size: 13px;
    }

    tbody tr:hover { background: rgba(139, 92, 246, 0.04); }

    .search-bar {
      width: 100%;
      padding: 10px 14px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 10px;
      color: #e2e8f0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .search-bar::placeholder { color: #475569; }
    .search-bar:focus { border-color: #7c3aed; }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary { background: #7c3aed; color: #fff; }
    .btn-primary:hover { background: #6d28d9; }

    .btn-danger {
      background: rgba(239, 68, 68, 0.15);
      color: #fca5a5;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }

    .btn-secondary {
      background: rgba(148, 163, 184, 0.1);
      color: #94a3b8;
      border: 1px solid rgba(148, 163, 184, 0.12);
    }
    .btn-secondary:hover { background: rgba(148, 163, 184, 0.18); color: #cbd5e1; }

    select.status-select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      outline: none;
      transition: all 0.2s;
      min-width: 110px;
    }

    select.status-select:focus { border-color: rgba(255,255,255,0.2); }

    .status-pending { background: rgba(234, 179, 8, 0.15); color: #fbbf24; }
    .status-confirmed { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .status-shipped { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .status-delivered { background: rgba(148, 163, 184, 0.15); color: #94a3b8; }
    .status-cancelled { background: rgba(239, 68, 68, 0.15); color: #f87171; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(148, 163, 184, 0.1);
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-group input::placeholder { color: #475569; }
    .form-group input:focus { border-color: #7c3aed; }

    .form-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .form-row .form-group { flex: 1; margin-bottom: 0; }

    .btn-sm {
      padding: 10px 16px;
      font-size: 12px;
      white-space: nowrap;
    }

    .message {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-top: 12px;
      display: none;
    }
    .message.success { display: block; background: rgba(34, 197, 94, 0.12); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); }
    .message.error { display: block; background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
    .message.info { display: block; background: rgba(59, 130, 246, 0.12); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.2); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: #475569;
    }

    .empty-state p { font-size: 15px; margin-top: 8px; }

    @media (max-width: 1024px) {
      .dashboard-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .admin-container { padding: 16px; }
      .admin-header { padding: 12px 16px; }
      .admin-logo { font-size: 20px; }
      .stat-value { font-size: 26px; }
    }
  </style>
</head>
<body>

  <header class="admin-header">
    <a href="#" class="admin-logo">MI<span>leGo</span></a>
    <div class="admin-header-right">
      <span>Panel Administrativo</span>
      <a href="../index.html" class="btn-back">← Volver a la Tienda</a>
    </div>
  </header>

  <main class="admin-container">

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Total Pedidos</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ventas Estimadas</div>
        <div class="stat-value" id="stat-sales"><span class="currency">$</span>0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Ticket Promedio</div>
        <div class="stat-value" id="stat-avg"><span class="currency">$</span>0</div>
      </div>
    </div>

    <div class="dashboard-grid">

      <div class="panel">
        <div class="panel-title"><span class="icon">📋</span> Pedidos</div>

        <input type="text" class="search-bar" id="searchInput" placeholder="Buscar por cliente, ID, ciudad, dirección...">

        <div class="toolbar">
          <button class="btn btn-primary" id="btnExportCSV">⬇ Exportar CSV (Dropi)</button>
          <button class="btn btn-danger" id="btnClearDB">🗑 Limpiar Base de Datos</button>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Fecha</th>
                <th>Cliente</th>
                <th>Teléfono</th>
                <th>Ciudad</th>
                <th>Dirección</th>
                <th>Combo</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="ordersBody"></tbody>
          </table>
        </div>

        <div id="emptyState" class="empty-state" style="display:none;">
          <p>No hay pedidos registrados</p>
        </div>
      </div>

      <div class="right-column">

        <div class="panel">
          <div class="panel-title"><span class="icon">🔗</span> Integración Chatea Pro</div>
          <div class="form-group">
            <label>URL del Webhook</label>
            <input type="url" id="webhookUrl" placeholder="https://app.chatea.pro/api/webhook/...">
          </div>
          <div class="form-group">
            <label>Token de Acceso</label>
            <input type="password" id="webhookToken" placeholder="••••••••••••••••">
          </div>
          <div class="form-row">
            <button class="btn btn-primary btn-sm" id="btnSaveWebhook">💾 Guardar</button>
            <button class="btn btn-secondary btn-sm" id="btnTestWebhook">🔌 Probar Conexión</button>
          </div>
          <div id="webhookMessage" class="message"></div>
        </div>

        <div class="panel">
          <div class="panel-title"><span class="icon">📦</span> Configuración Dropi</div>
          <div class="form-group">
            <label>SKU del Producto</label>
            <input type="text" id="dropiSku" placeholder="Ej: DPI-12345">
          </div>
          <button class="btn btn-primary btn-sm" id="btnSaveDropi">💾 Guardar SKU</button>
          <div id="dropiMessage" class="message"></div>
        </div>

      </div>

    </div>

  </main>

  <script src="../config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
