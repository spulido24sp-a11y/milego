<!DOCTYPE html>
<html lang="es-CO">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MIleGo Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;900&display=swap">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.__errs = [];
    function __showErr(msg) {
      window.__errs.push(msg);
      document.title = 'ERR: ' + msg.slice(0, 120);
      var b = document.createElement('pre');
      b.style.cssText = 'color:#fff;background:#7f1d1;padding:20px;white-space:pre-wrap;font:13px monospace;position:fixed;inset:0;z-index:99999;margin:0;overflow:auto';
      b.textContent = 'ERROR:\n' + window.__errs.join('\n\n');
      document.body.appendChild(b);
    }
    window.addEventListener('error', function (e) {
      __showErr((e.error && e.error.stack) || (e.message + ' @ ' + e.filename + ':' + e.lineno));
    });
    window.addEventListener('unhandledrejection', function (e) {
      __showErr('REJECT: ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
    });
    setTimeout(function () {
      var a = document.getElementById('app');
      var b = document.createElement('div');
      b.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#111;color:#0f0;font:12px monospace;padding:6px;z-index:99998';
      b.textContent = 'PROBE appLen=' + (a ? a.innerHTML.length : 'NOAPP') + ' hash=' + location.hash + ' rt=' + (typeof window.__rt) + ' tok=' + (localStorage.getItem('milego_access') ? 'Y' : 'N');
      document.body.appendChild(b);
    }, 1200);
  </script>
  <script type="module" src="js/admin.js"></script>
</body>
</html>
