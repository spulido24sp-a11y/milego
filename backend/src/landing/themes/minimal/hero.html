<div class="theme-minimal-hero">
  <div class="minimal-container">
    <h1 class="minimal-headline">{{PRODUCT_NAME}}</h1>
    <p class="minimal-sub">{{PRODUCT_SUBTITLE}}</p>
    <div class="minimal-price">{{OFFER_PRICE}} COP</div>
    <a href="#checkout-section" class="minimal-btn">{{CTA_TEXT}}</a>
    {{WHATSAPP_HERO_BTN}}
    <div class="minimal-social" style="margin-top:10px;color:#16a34a;font-weight:600;">{{SOCIAL_PROOF}}</div>
    <div class="minimal-image-box">
      <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" class="minimal-img" />
    </div>
  </div>
</div>
