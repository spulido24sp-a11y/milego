<div id="checkout-section" class="theme-editorial-checkout">
  <div class="editorial-checkout-card">
    <h3>Detalles del Despacho</h3>
    <form class="editorial-form" onsubmit="handleDemoSubmit(event)">
      <input type="text" placeholder="Nombre completo" required class="editorial-input" />
      <input type="tel" placeholder="Número celular / WhatsApp" required class="editorial-input" />
      <input type="text" placeholder="Dirección de envío" required class="editorial-input" />
      <input type="text" placeholder="Ciudad o Municipio" required class="editorial-input" />
      <button type="submit" class="editorial-submit-btn">Completar Pedido (Contra Entrega)</button>
    </form>
  </div>
</div>
