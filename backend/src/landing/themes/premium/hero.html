<section class="hero">
  <div class="hero-bg"></div>
  <div class="container">
    <div class="hero-grid">
      <div class="hero-content">
        <div class="hero-tag"><span class="hero-tag-icon"><i class="fa-solid fa-circle-check"></i></span> {{SOCIAL_PROOF}}</div>
        <h1 class="hero-title">{{PRODUCT_NAME}}</h1>
        <p class="hero-subtitle">{{PRODUCT_SUBTITLE}}</p>
        <div class="hero-price">
          <span class="hero-price-label">Hoy desde</span>
          <span class="hero-price-value">{{OFFER_PRICE}}</span>
          <span class="hero-price-old">{{OLD_PRICE}}</span>
          <span class="hero-price-save">Ahorra {{DISCOUNT_PCT}}%</span>
        </div>
        <div class="hero-cta-wrap">
          <a href="#checkout" class="btn btn-primary btn-lg hero-cta-pulse">{{CTA_TEXT}}</a>
          {{WHATSAPP_HERO_BTN}}
        </div>
        <div class="hero-trust-micro">
          <span><i class="fa-solid fa-shield-halved"></i> Pago contra entrega</span>
          <span><i class="fa-solid fa-truck"></i> Envío gratis</span>
          <span><i class="fa-solid fa-rotate-left"></i> 30 días de garantía</span>
        </div>
        <div class="hero-urgency">🔥 {{STOCK_URGENCY}}</div>
        <div class="hero-carriers">
          <span class="hero-carriers-label">Envíos por:</span>
          <span class="carrier-badge"><i class="fa-solid fa-box"></i> Servientrega</span>
          <span class="carrier-badge"><i class="fa-solid fa-box"></i> Envía</span>
          <span class="carrier-badge"><i class="fa-solid fa-box"></i> Interrapidísimo</span>
        </div>
      </div>
      <div class="hero-image-wrap">
        <div class="hero-glow"></div>
        <img src="{{PRODUCT_IMAGE}}" alt="{{PRODUCT_NAME}}" width="500" height="500" fetchpriority="high">
      </div>
    </div>
  </div>
</section>
