<section class="section" style="background:var(--bg-secondary);">
  <div class="container">
    <div class="section-header">
      <h2>¿Por qué elegir {{PRODUCT_NAME}}?</h2>
      <p>Beneficios diseñados para ti</p>
    </div>
    <div class="benefits-grid">
      {{#each BENEFIT_ITEMS}}
      <div class="card card-hover">
        <div class="card-icon"><i class="fa-solid fa-circle-check"></i></div>
        <h3>{{benefitTitle}}</h3>
        <p style="color:var(--text-secondary); font-size:var(--text-sm); line-height:var(--leading-relaxed); margin-top:var(--space-2);">{{benefitText}}</p>
      </div>
      {{/each}}
    </div>
  </div>
</section>
