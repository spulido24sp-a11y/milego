<style>
.theme-conversion-v2 footer { background: #050510; padding: 40px 0 28px; }
.theme-conversion-v2 .footer-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 28px; margin-bottom: 28px; }
@media(max-width:768px){ .theme-conversion-v2 .footer-grid { grid-template-columns: 1fr 1fr; gap: 20px; } }
@media(max-width:480px){ .theme-conversion-v2 .footer-grid { grid-template-columns: 1fr; } }
.theme-conversion-v2 footer h5 { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.7); margin-bottom: 10px; }
.theme-conversion-v2 footer p, .theme-conversion-v2 footer a { font-size: 11px; color: rgba(255,255,255,0.3); line-height: 1.8; display: block; text-decoration: none; }
.theme-conversion-v2 footer a:hover { color: rgba(255,255,255,0.5); }
.theme-conversion-v2 .footer-brand { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 2px; display: block; }
.theme-conversion-v2 .footer-brand small { font-size: 9px; font-weight: 400; color: rgba(255,255,255,0.25); display: block; }
.theme-conversion-v2 .footer-desc { font-size: 11px; color: rgba(255,255,255,0.25); margin-bottom: 10px; line-height: 1.6; }
.theme-conversion-v2 .footer-contact { display: flex; align-items: center; gap: 5px; font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 3px; }
.theme-conversion-v2 .payment-badges { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.theme-conversion-v2 .payment-badges span { padding: 3px 8px; border-radius: 4px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.04); font-size: 9px; color: rgba(255,255,255,0.25); }
.theme-conversion-v2 .footer-bottom { border-top: 1px solid rgba(255,255,255,0.04); padding-top: 16px; text-align: center; }
.theme-conversion-v2 .footer-bottom p { font-size: 10px; color: rgba(255,255,255,0.15); }
</style>

<script>
(function(){
  try {
  // FAQ toggle
  document.querySelectorAll('.faq-item').forEach(function(el){
    el.addEventListener('click', function(){ this.classList.toggle('open'); });
  });

  // Countdown (48h from page load)
  (function(){
    var e = new Date(); e.setHours(e.getHours() + 48);
    function update(){
      var d = e - new Date();
      if (d <= 0) return;
      var h = document.getElementById('cd-hours');
      var m = document.getElementById('cd-mins');
      var s = document.getElementById('cd-secs');
      if (h) h.textContent = String(Math.floor(d / 3600000)).padStart(2,'0');
      if (m) m.textContent = String(Math.floor((d % 3600000) / 60000)).padStart(2,'0');
      if (s) s.textContent = String(Math.floor((d % 60000) / 1000)).padStart(2,'0');
    }
    update();
    setInterval(update, 1000);
  })();

  // Floating CTA
  (function(){
    var hero = document.querySelector('.hero');
    var btn = document.createElement('a');
    btn.innerHTML = '&#128722; Ordenar &mdash; {{OFFER_PRICE}}';
    btn.href = '#ordenar';
    btn.className = 'floating-cta';
    document.body.appendChild(btn);
    var style = document.createElement('style');
    style.textContent = '.theme-conversion-v2 .floating-cta{position:fixed;bottom:16px;right:16px;z-index:999;background:#ef4444;color:#fff;border:none;padding:12px 24px;border-radius:60px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;box-shadow:0 8px 30px rgba(239,68,68,0.4);display:none;align-items:center;gap:6px}.theme-conversion-v2 .floating-cta.show{display:inline-flex}.theme-conversion-v2 .floating-cta:hover{transform:scale(1.04)}';
    document.head.appendChild(style);
    window.addEventListener('scroll', function(){
      var isPast = window.scrollY > (hero ? hero.offsetHeight : 400);
      btn.classList.toggle('show', isPast);
    });
  })();

  // Visitor counter (fake social proof)
  (function(){
    var el = document.createElement('div');
    el.className = 'visitor-counter';
    el.innerHTML = '<span class="pulse"></span> <strong><span id="visitorCount">12</span></strong> personas est\u00e1n viendo esto ahora';
    document.body.appendChild(el);
    var style = document.createElement('style');
    style.textContent = '.theme-conversion-v2 .visitor-counter{position:fixed;top:80px;right:16px;z-index:999;background:#0a0a1a;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:8px 14px;font-size:11px;color:rgba(255,255,255,0.55);box-shadow:0 4px 16px rgba(0,0,0,0.2);display:flex;align-items:center;gap:6px}.theme-conversion-v2 .visitor-counter .pulse{width:6px;height:6px;border-radius:50%;background:#ef4444;display:inline-block;animation:pulseDot 2s infinite}@keyframes pulseDot{0%,100%{opacity:1}50%{opacity:0.3}}@media(max-width:480px){.theme-conversion-v2 .visitor-counter{display:none}}';
    document.head.appendChild(style);
    var count = document.getElementById('visitorCount');
    if (count) {
      var n = 12 + Math.floor(Math.random() * 18);
      count.textContent = n;
      setInterval(function(){
        n += Math.random() > 0.5 ? 1 : -1;
        if (n < 3) n = 3; if (n > 45) n = 45;
        count.textContent = n;
      }, 8000 + Math.random() * 4000);
    }
  })();

  // Purchase notifications (fake)
  (function(){
    var names = ['María P.','Carlos R.','Diana L.','Andrés M.','Laura T.','José G.','Valentina S.','Felipe O.'];
    var cities = ['Bogotá','Medellín','Cali','Barranquilla','Cartagena','Bucaramanga'];
    function simulate(){
      var n = names[Math.floor(Math.random() * names.length)];
      var c = cities[Math.floor(Math.random() * cities.length)];
      var notif = document.createElement('div');
      notif.className = 'purchase-notif';
      notif.innerHTML = '&#128722; <strong>' + n + '</strong> compr\u00f3 hace ' + (Math.floor(Math.random() * 8) + 1) + ' min \u00b7 ' + c;
      document.body.appendChild(notif);
      setTimeout(function(){ notif.remove(); }, 5000);
    }
    var style = document.createElement('style');
    style.textContent = '.theme-conversion-v2 .purchase-notif{position:fixed;bottom:80px;left:16px;z-index:9998;background:#0a0a1a;border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px 14px;font-size:11px;color:rgba(255,255,255,0.55);animation:notifIn .4s ease,notifOut .4s ease 4.6s forwards;display:flex;align-items:center;gap:6px;max-width:260px}@keyframes notifIn{from{transform:translateX(-120%);opacity:0}to{transform:translateX(0);opacity:1}}@keyframes notifOut{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}.theme-conversion-v2 .purchase-notif strong{color:#fff}';
    document.head.appendChild(style);
    setInterval(simulate, 15000 + Math.random() * 10000);
    setTimeout(simulate, 3000);
  })();

  // Progress bar
  (function(){
    var bar = document.createElement('div');
    bar.id = 'progressBar';
    document.body.prepend(bar);
    var style = document.createElement('style');
    style.textContent = '#progressBar{position:fixed;top:0;left:0;width:0%;height:3px;background:#ef4444;z-index:9999;transition:width .1s ease}';
    document.head.appendChild(style);
    window.addEventListener('scroll', function(){
      var h = document.documentElement.scrollHeight - window.innerHeight;
      if (h <= 0) bar.style.width = '100%';
      else bar.style.width = (window.scrollY / h) * 100 + '%';
    });
  })();

  // Order form submission
  var orderForm = document.getElementById('checkoutForm');
  if (orderForm) {
    orderForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var name = (document.getElementById('billing_name')||{}).value;
      var phone = (document.getElementById('billing_phone')||{}).value;
      var address = (document.getElementById('billing_address')||{}).value;
      var city = (document.getElementById('billing_city')||{}).value;
      if (!name || !phone || !address || !city) { alert('Completa todos los campos obligatorios'); return; }
      var btn = orderForm.querySelector('button[type="submit"]');
      btn.disabled = true; btn.textContent = 'Procesando...';
      fetch('/api/v1/checkout', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          customer: { name: name, phone: phone },
          shipping_address: { street: address, city: city, state: '', country: 'Colombia' },
          items: [{ product_id: parseInt(document.getElementById('productId')?.value || 0), quantity: 1 }],
          payment_method: 'cash_on_delivery',
          whatsapp_opt_in: true
        })
      }).then(function(r){return r.json()}).then(function(json){
        if (json.success) {
          window.location.href = '/gracias.html?order=' + encodeURIComponent(json.data?.order?.order_number || '') + '&nombre=' + encodeURIComponent(name);
        } else {
          alert('Error: ' + (json.error?.message || 'No se pudo procesar')); btn.disabled = false; btn.textContent = 'CONFIRMAR MI PEDIDO';
        }
      }).catch(function(){
        alert('Error de conexion. Verifica tu internet.'); btn.disabled = false; btn.textContent = 'CONFIRMAR MI PEDIDO';
      });
    });
  } catch(e) { console.error('[landing]', e); }
})();
</script>

<script>
(function(){
  var SID = localStorage.getItem('milego_sid') || 's_' + Date.now() + '_' + Math.random().toString(36).slice(2,8);
  localStorage.setItem('milego_sid', SID);

  function track(name, extra) {
    if (navigator.sendBeacon) {
      navigator.sendBeacon('/api/v1/analytics/track', JSON.stringify({
        event_type: 'landing',
        event_name: name,
        payload: extra || {},
        source: window.location.pathname
      }));
    }
  }

  track('landing_view', { url: window.location.href, referrer: document.referrer });

  var scrollFired = {};
  window.addEventListener('scroll', function() {
    var pct = Math.round((window.scrollY + window.innerHeight) / document.body.scrollHeight * 100);
    if (pct >= 25 && !scrollFired['25']) { scrollFired['25'] = true; track('scroll_25'); }
    if (pct >= 50 && !scrollFired['50']) { scrollFired['50'] = true; track('scroll_50'); }
    if (pct >= 75 && !scrollFired['75']) { scrollFired['75'] = true; track('scroll_75'); }
  }, { passive: true });

  document.addEventListener('click', function(e) {
    var t = e.target.closest('a[href*="#ordenar"], .btn, button, .btn-p, .nav-cta');
    if (!t) return;
    var text = (t.textContent || '').trim().substring(0, 60);
    track('cta_click', { text: text, href: t.getAttribute('href') || '' });
  });

  window.__track = track;
  window.__sessionId = SID;
})();
</script>
<script src="/config.js"></script>
<script type="module" src="/js/app.js"></script>
</body>
