openapi: '3.1.0'
info:
  title: MIleGo API
  version: 7.0.0
  description: API de la plataforma de ecommerce MIleGo
servers:
  - url: /api/v1
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id: { type: integer }
        uuid: { type: string }
        name: { type: string }
        slug: { type: string }
        price: { type: integer }
        status: { type: string }
        stock: { type: integer }
    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: array, items: { type: object } }
paths:
  /health:
    get:
      summary: Health check
      tags: [System]
      responses:
        '200':
          description: API saludable
  /auth/login:
    post:
      summary: Iniciar sesión
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Login exitoso
        '401':
          description: Credenciales inválidas
  /auth/refresh:
    post:
      summary: Refrescar token de acceso
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Nuevos tokens generados
        '401':
          description: Token inválido o revocado
  /auth/logout:
    post:
      summary: Cerrar sesión
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Sesión cerrada
        '401':
          description: No autorizado
  /auth/me:
    get:
      summary: Usuario actual
      tags: [Auth]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Datos del usuario
  /config:
    get:
      summary: Configuración pública
      tags: [Config]
      responses:
        '200':
          description: Configuración de la tienda
  /products:
    get:
      summary: Listar productos
      tags: [Products]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Lista paginada de productos
    post:
      summary: Crear producto
      tags: [Products]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                price: { type: integer }
                stock: { type: integer }
      responses:
        '201':
          description: Producto creado
        '400':
          description: Error de validación
  /products/{id}:
    get:
      summary: Obtener producto por ID
      tags: [Products]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Datos del producto
        '404':
          description: Producto no encontrado
    put:
      summary: Actualizar producto
      tags: [Products]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                price: { type: integer }
                stock: { type: integer }
                status: { type: string }
      responses:
        '200':
          description: Producto actualizado
        '400':
          description: Error de validación
        '404':
          description: Producto no encontrado
    delete:
      summary: Eliminar producto
      tags: [Products]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Producto eliminado
        '404':
          description: Producto no encontrado
  /products/{slug}/public:
    get:
      summary: Producto público
      tags: [Products]
      parameters:
        - name: slug
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Datos del producto
  /categories:
    get:
      summary: Listar categorías
      tags: [Categories]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Lista de categorías
    post:
      summary: Crear categoría
      tags: [Categories]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '201':
          description: Categoría creada
        '400':
          description: Error de validación
  /categories/{id}:
    get:
      summary: Obtener categoría por ID
      tags: [Categories]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Datos de la categoría
        '404':
          description: Categoría no encontrada
    put:
      summary: Actualizar categoría
      tags: [Categories]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200':
          description: Categoría actualizada
        '400':
          description: Error de validación
        '404':
          description: Categoría no encontrada
    delete:
      summary: Eliminar categoría
      tags: [Categories]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Categoría eliminada
        '404':
          description: Categoría no encontrada
  /users:
    get:
      summary: Listar usuarios
      tags: [Users]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Lista de usuarios
    post:
      summary: Crear usuario
      tags: [Users]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                role: { type: string }
      responses:
        '201':
          description: Usuario creado
        '400':
          description: Error de validación
        '403':
          description: Sin permisos
  /users/{id}:
    put:
      summary: Actualizar usuario
      tags: [Users]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                role: { type: string }
      responses:
        '200':
          description: Usuario actualizado
        '400':
          description: Error de validación
        '403':
          description: Sin permisos
        '404':
          description: Usuario no encontrado
    delete:
      summary: Eliminar usuario
      tags: [Users]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '204':
          description: Usuario eliminado
        '403':
          description: Sin permisos
        '404':
          description: Usuario no encontrado
  /audit:
    get:
      summary: Listar auditoría
      tags: [Audit]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: per_page
          in: query
          schema: { type: integer }
      responses:
        '200':
          description: Lista paginada de eventos de auditoría
        '403':
          description: Sin permisos
  /admin/events/{id}/replay:
    post:
      summary: Reintentar un evento
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Evento reintentado
        '403':
          description: Sin permisos
        '404':
          description: Evento no encontrado
  /admin/jobs/{id}/retry:
    post:
      summary: Reintentar un job fallido
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: Job reintentado
        '403':
          description: Sin permisos
        '404':
          description: Job no encontrado
  /admin/metrics:
    get:
      summary: Métricas del sistema
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          description: Métricas en tiempo real
        '403':
          description: Sin permisos